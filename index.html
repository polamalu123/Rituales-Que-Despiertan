                <input key={f.k} value={addr[f.k]} onChange={e=>setAddr(a=>({...a,[f.k]:e.target.value}))} placeholder={f.ph} style={{...inp(),marginBottom:8}}/>

            </div>
          </div>
        </div>
      )}

      <button onClick={onAdmin} style={{position:"fixed",bottom:20,left:20,width:32,height:32,background:"rgba(0,0,0,0.1)",border:"none",borderRadius:"50%",cursor:"pointer",fontSize:13,color:"rgba(0,0,0,0.2)",zIndex:50}}>⚙</button>
      {toast&&<Toast msg={toast}/>}
    </div>
  );
}

// ── ADMIN ──
function Admin({onSalir}){
  const [seccion,setSeccion]=useState("pedidos");
  const [pedidos,setPedidos]=useState([]);
  const [productos,setProductos]=useState([]);
  const [config,setConfig]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState("");
  const [detalle,setDetalle]=useState(null);
  const [editProd,setEditProd]=useState(null);
  const [filtroSt,setFiltroSt]=useState("todos");
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  useEffect(()=>{
    (async()=>{
      const [peds,prods,cfg]=await Promise.all([
        query("pedidos","?select=*&order=created_at.desc"),
        query("productos","?select=*&order=id.asc"),
        query("config","?select=*"),
      ]);
      setPedidos(Array.isArray(peds)?peds:[]);
      setProductos(Array.isArray(prods)?prods:[]);
      setConfig(Array.isArray(cfg)?cfg:[]);
      setLoading(false);
    })();
  },[]);

  const hoy=new Date().toISOString().slice(0,10);
  const hoyPeds=pedidos.filter(p=>p.created_at?.slice(0,10)===hoy);
  const ventasHoy=hoyPeds.filter(p=>p.status!=="cancelado").reduce((s,p)=>s+Number(p.total),0);
  const nuevos=pedidos.filter(p=>p.status==="nuevo").length;

  const cambiarStatus=async(id,status)=>{
    await mutate("pedidos","PATCH",{status},`?id=eq.${id}`);
    setPedidos(pr=>pr.map(p=>p.id===id?{...p,status}:p));
    if(detalle?.id===id)setDetalle(pr=>({...pr,status}));
    showToast("✦ Status actualizado");
  };

  const guardarProd=async(form)=>{
    const d={nombre:form.nombre,descripcion:form.descripcion,precio:Number(form.precio),stock:Number(form.stock),categoria:form.categoria,emoji:form.emoji,activo:form.activo};
    if(form.id){await mutate("productos","PATCH",d,`?id=eq.${form.id}`);setProductos(pr=>pr.map(p=>p.id===form.id?{...p,...d}:p));}
    else{const n=await mutate("productos","POST",d);if(Array.isArray(n))setProductos(pr=>[...pr,n[0]]);}
    setEditProd(null);showToast("✦ Producto guardado");
  };

  const guardarConfig=async(items)=>{
    await Promise.all(items.map(i=>mutate("config","PATCH",{valor:i.valor},`?clave=eq.${i.clave}`)));
    setConfig(items);showToast("✦ Config guardada");
  };

  const pedF=filtroSt==="todos"?pedidos:pedidos.filter(p=>p.status===filtroSt);

  if(loading)return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;

  return(
    <div style={{fontFamily:"'Jost',sans-serif",background:"#f5f0e8",minHeight:"100vh"}}>
      <div style={{background:"#1a1510",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#f0e8d4",fontWeight:600}}>☽ Aether <span style={{color:"#c8902a",fontSize:13,fontWeight:400}}>Admin</span></div>
        <button onClick={onSalir} style={{fontSize:12,color:"rgba(240,220,180,0.6)",background:"none",border:"1px solid rgba(240,220,180,0.2)",borderRadius:50,padding:"5px 14px",cursor:"pointer"}}>Ver tienda</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,padding:"16px",maxWidth:480,margin:"0 auto"}}>
        {[{l:"Pedidos hoy",v:hoyPeds.length,i:"📦"},{l:"Ventas hoy",v:`$${ventasHoy}`,i:"💰"},{l:"Sin confirmar",v:nuevos,i:"🆕"}].map(s=>(
          <div key={s.l} style={{background:"white",borderRadius:14,padding:"12px 10px",textAlign:"center",border:"1px solid #e0d8cc"}}>
            <div style={{fontSize:20,marginBottom:4}}>{s.i}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",fontWeight:600}}>{s.v}</div>
            <div style={{fontSize:11,color:"#7a6e60"}}>{s.l}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",borderBottom:"2px solid #e0d8cc",background:"white",padding:"0 16px",maxWidth:480,margin:"0 auto"}}>
        {[["pedidos","📋 Pedidos"],["productos","📦 Productos"],["config","⚙️ Config"]].map(([k,l])=>(
          <button key={k} onClick={()=>setSeccion(k)} style={{padding:"13px 14px",border:"none",background:"transparent",cursor:"pointer",fontSize:13,fontWeight:500,color:seccion===k?"#c8902a":"#7a6e60",borderBottom:seccion===k?"2px solid #c8902a":"2px solid transparent",marginBottom:-2}}>{l}</button>
        ))}
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px 80px"}}>
        {seccion==="pedidos"&&(
          <>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
              {[["todos","Todos"],["nuevo","🆕 Nuevos"],["confirmado","✅ Conf."],["enviado","🚚 Env."],["entregado","🏠 Entr."],["cancelado","❌ Canc."]].map(([k,l])=>(
                <button key={k} onClick={()=>setFiltroSt(k)} style={{padding:"5px 12px",borderRadius:50,border:`1.5px solid ${filtroSt===k?"#c8902a":"#e0d8cc"}`,background:filtroSt===k?"#c8902a":"white",color:filtroSt===k?"white":"#2e2416",cursor:"pointer",fontSize:12}}>{l}</button>
              ))}
            </div>
            {pedF.length===0&&<div style={{textAlign:"center",padding:60,color:"#7a6e60"}}>🌙 Sin pedidos</div>}
            {pedF.map(p=>(
              <div key={p.id} onClick={()=>setDetalle(p)} style={{background:"white",borderRadius:16,border:"1px solid #e0d8cc",padding:"14px 16px",marginBottom:10,cursor:"pointer"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600}}>{p.folio}</div>
                    <div style={{fontSize:12,color:"#7a6e60"}}>{p.cliente_nombre} · {p.cliente_telefono}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:16,fontWeight:600,color:"#c8902a"}}>${p.total}</div>
                    <span style={{fontSize:11,padding:"2px 8px",borderRadius:50,background:STATUS_COLORS[p.status]+"22",color:STATUS_COLORS[p.status]}}>{STATUS_LABELS[p.status]}</span>
                  </div>
                </div>
                <div style={{fontSize:12,color:"#7a6e60"}}>{p.tipo_envio==="cobertura"?"🚚 Sin costo":"📦 Paquetería"} · {new Date(p.created_at).toLocaleDateString("es-MX",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
              </div>
            ))}
          </>
        )}

        {seccion==="productos"&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.5rem"}}>Productos</div>
              <button onClick={()=>setEditProd({id:null,nombre:"",descripcion:"",precio:0,stock:0,categoria:CATS[0],emoji:"✨",activo:true})} style={{...btn("#c8902a",{width:"auto",padding:"8px 16px"})}}>+ Nuevo</button>
            </div>
            {productos.map(p=>(
              <div key={p.id} style={{background:"white",borderRadius:14,border:"1px solid #e0d8cc",padding:"12px 14px",marginBottom:10,display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:52,height:52,borderRadius:10,background:p.imagen_url?`url(${p.imagen_url}) center/cover`:"#f0ecf5",backgroundSize:"cover",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem",flexShrink:0}}>{!p.imagen_url&&p.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600}}>{p.nombre}</div>
                  <div style={{fontSize:12,color:"#7a6e60",display:"flex",gap:8,marginTop:3}}>
                    <span style={{color:"#c8902a",fontWeight:500}}>${p.precio}</span>
                    <span style={{color:p.stock>3?"#2d7a2d":p.stock>0?"#c8902a":"#999"}}>Stock: {p.stock}</span>
                    {!p.activo&&<span style={{color:"#999"}}>Oculto</span>}
                  </div>
                </div>
                <button onClick={()=>setEditProd({...p})} style={{padding:"6px 14px",border:"1.5px solid #e0d8cc",borderRadius:50,background:"transparent",cursor:"pointer",fontSize:12}}>Editar</button>
              </div>
            ))}
          </>
        )}

        {seccion==="config"&&<ConfigForm config={config} onGuardar={guardarConfig}/>}
      </div>

      {detalle&&<DetallePedido pedido={detalle} onCerrar={()=>setDetalle(null)} onCambiarStatus={cambiarStatus}/>}
      {editProd&&<EditorProducto prod={editProd} onGuardar={guardarProd} onCerrar={()=>setEditProd(null)}/>}
      {toast&&<Toast msg={toast}/>}
    </div>
  );
}

function DetallePedido({pedido,onCerrar,onCambiarStatus}){
  const [items,setItems]=useState([]);
  useEffect(()=>{query("pedido_items",`?pedido_id=eq.${pedido.id}&select=*`).then(r=>setItems(Array.isArray(r)?r:[]));}, [pedido.id]);
  const notif=()=>{
    const msgs={confirmado:"✅ Tu pedido ha sido *confirmado*. Te enviamos datos de pago en breve.",enviado:"🚚 Tu pedido está *en camino*. ¡Pronto llegará!",entregado:"🏠 Tu pedido fue *entregado*. ¡Gracias por tu compra en Aether! ☽"};
    const msg=encodeURIComponent(`Hola ${pedido.cliente_nombre} 🌙\n\n${msgs[pedido.status]||"Tu pedido fue actualizado."}\n\nFolio: *${pedido.folio}*\nTotal: $${pedido.total}\n\n— Aether ☽`);
    window.open(`https://wa.me/52${pedido.cliente_telefono}?text=${msg}`,"_blank");
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#faf7f2",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"88vh",overflowY:"auto",padding:"24px 20px 32px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.4rem",fontWeight:600}}>{pedido.folio}</div><div style={{fontSize:12,color:"#7a6e60"}}>{new Date(pedido.created_at).toLocaleDateString("es-MX",{dateStyle:"full"})}</div></div>
          <button onClick={onCerrar} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#7a6e60"}}>✕</button>
        </div>
        <div style={{background:"white",borderRadius:14,border:"1px solid #e0d8cc",padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:11,color:"#7a6e60",marginBottom:8}}>👤 CLIENTE</div>
          <div style={{fontWeight:500}}>{pedido.cliente_nombre}</div>
          <div style={{fontSize:13,color:"#7a6e60"}}>📞 {pedido.cliente_telefono}</div>
          <div style={{fontSize:13,color:"#7a6e60",marginTop:4}}>📍 {pedido.cliente_calle}, Col. {pedido.cliente_colonia}, CP {pedido.cliente_cp}{pedido.cliente_alcaldia?`, ${pedido.cliente_alcaldia}`:""}</div>
          {pedido.cliente_referencias&&<div style={{fontSize:12,color:"#7a6e60"}}>Refs: {pedido.cliente_referencias}</div>}
          <div style={{marginTop:8,fontSize:12}}>{pedido.tipo_envio==="cobertura"?"🚚 Envío sin costo":"📦 Paquetería"}</div>
        </div>
        <div style={{background:"white",borderRadius:14,border:"1px solid #e0d8cc",padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:11,color:"#7a6e60",marginBottom:8}}>📦 PRODUCTOS</div>
          {items.map(item=><div key={item.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"6px 0",borderBottom:"1px solid #f0ece6"}}><span>{item.nombre} ×{item.cantidad}</span><span style={{color:"#c8902a",fontWeight:500}}>${item.precio*item.cantidad}</span></div>)}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontWeight:600,fontSize:15}}><span>Total</span><span style={{color:"#c8902a"}}>${pedido.total}</span></div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:"#7a6e60",marginBottom:10}}>CAMBIAR STATUS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {Object.entries(STATUS_LABELS).map(([k,l])=>(
              <button key={k} onClick={()=>onCambiarStatus(pedido.id,k)} style={{padding:"8px 14px",borderRadius:50,border:`1.5px solid ${pedido.status===k?STATUS_COLORS[k]:"#e0d8cc"}`,background:pedido.status===k?STATUS_COLORS[k]+"22":"white",color:pedido.status===k?STATUS_COLORS[k]:"#2e2416",cursor:"pointer",fontSize:12,fontWeight:pedido.status===k?600:400}}>{l}</button>
            ))}
          </div>
        </div>
        <button onClick={notif} style={{...btn("#25D366")}}>Notificar al cliente por WhatsApp 📲</button>
      </div>
    </div>
  );
}

function EditorProducto({prod,onGuardar,onCerrar}){
  const [form,setForm]=useState({...prod});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#faf7f2",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"88vh",overflowY:"auto",padding:"24px 20px 32px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.4rem"}}>{form.id?"Editar":"Nuevo producto"}</h3>
          <button onClick={onCerrar} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#7a6e60"}}>✕</button>
        </div>
        {[{l:"Nombre",k:"nombre"},{l:"Descripción",k:"descripcion"},{l:"Precio ($)",k:"precio",n:true},{l:"Stock",k:"stock",n:true},{l:"Emoji",k:"emoji"}].map(f=>(
          <div key={f.k} style={{marginBottom:12}}>
            <label style={{fontSize:12,color:"#7a6e60",display:"block",marginBottom:4}}>{f.l}</label>
            <input type={f.n?"number":"text"} value={form[f.k]} onChange={e=>set(f.k,f.n?Number(e.target.value):e.target.value)} style={{...inp()}}/>
          </div>
        ))}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,color:"#7a6e60",display:"block",marginBottom:4}}>Categoría</label>
          <select value={form.categoria} onChange={e=>set("categoria",e.target.value)} style={{...inp()}}>
            {CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <input type="checkbox" checked={form.activo} onChange={e=>set("activo",e.target.checked)}/>
          <span style={{fontSize:14}}>Visible en tienda</span>
        </div>
        <button onClick={()=>onGuardar(form)} style={{...btn()}}>Guardar</button>
      </div>
    </div>
  );
}

function ConfigForm({config,onGuardar}){
  const [items,setItems]=useState(config.map(c=>({...c})));
  const labels={whatsapp:"WhatsApp (con código de país)",banco:"Banco",titular:"Titular de cuenta",clabe:"CLABE (18 dígitos)",cuenta:"Número de cuenta",concepto:"Concepto de pago"};
  const set=(clave,valor)=>setItems(pr=>pr.map(i=>i.clave===clave?{...i,valor}:i));
  return(
    <div style={{background:"white",borderRadius:16,border:"1px solid #e0d8cc",padding:20}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:20}}>Cuenta bancaria y contacto</div>
      {items.map(item=>(
        <div key={item.clave} style={{marginBottom:14}}>
          <label style={{fontSize:12,color:"#7a6e60",display:"block",marginBottom:4}}>{labels[item.clave]||item.clave}</label>
          <input value={item.valor||""} onChange={e=>set(item.clave,e.target.value)} style={{...inp(),background:"#faf7f2"}}/>
        </div>
      ))}
      <button onClick={()=>onGuardar(items)} style={{...btn(),marginTop:4}}>Guardar configuración</button>
    </div>
  );
}

// ── ROOT ──
function App(){
  const [vista,setVista]=useState("tienda");
  const [pin,setPin]=useState("");
  const [pinErr,setPinErr]=useState(false);
  const entrar=()=>{if(pin===PIN_ADMIN){setVista("admin");setPin("");setPinErr(false);}else{setPinErr(true);setPin("");}};
  if(vista==="pin")return(
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#1a1208",flexDirection:"column",gap:20,padding:24}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"2rem",color:"#e0aa4a"}}>☽ Admin</div>
      <input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entrar()} placeholder="PIN" maxLength={6}
        style={{padding:"12px 20px",border:`2px solid ${pinErr?"#c0392b":"rgba(200,144,42,0.3)"}`,borderRadius:50,background:"transparent",color:"white",fontSize:18,outline:"none",textAlign:"center",letterSpacing:"0.3em",width:200}}/>
      {pinErr&&<div style={{color:"#e74c3c",fontSize:13}}>PIN incorrecto</div>}
      <button onClick={entrar} style={{padding:"12px 32px",background:"#c8902a",color:"white",border:"none",borderRadius:50,fontSize:14,cursor:"pointer",fontWeight:500}}>Entrar</button>
      <button onClick={()=>setVista("tienda")} style={{color:"rgba(240,220,180,0.4)",background:"none",border:"none",cursor:"pointer",fontSize:13}}>Volver</button>
    </div>
  );
  if(vista==="admin")return <Admin onSalir={()=>setVista("tienda")}/>;
  return <Tienda onAdmin={()=>setVista("pin")}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
