/* ══════════════════════════════════════════════

══════════════════════════════════════════════ */

  const [drawer,setDrawer]=useState(false);
  const [addr,setAddr]=useState({nombre:"",telefono:"",calle:"",colonia:"",cp:"",alcaldia:"",refs:""});
  const [cpSt,setCpSt]=useState(null);
  const [toast,setToast]=useState("");
  const [loading,setLoading]=useState(true);
  const [enviando,setEnviando]=useState(false);

  const toast2=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  useEffect(()=>{
    (async()=>{
      const [p,c]=await Promise.all([
        db("productos","?select=*&activo=eq.true&order=id.asc"),
        db("config","?select=clave,valor"),
      ]);
      setProds(Array.isArray(p)?p:[]);
      if(Array.isArray(c)){const m={};c.forEach(r=>m[r.clave]=r.valor);setCfg(m);}
      setLoading(false);
    })();
  },[]);

  const cats=["Todos",...CATS.filter(c=>prods.some(p=>p.categoria===c))];
  const vis=prods.filter(p=>(filtro==="Todos"||p.categoria===filtro)&&(!busq||p.nombre.toLowerCase().includes(busq.toLowerCase())));

  const inCart=id=>carrito.some(c=>c.id===id);
  const add=p=>{if(!inCart(p.id)){setCarrito(pr=>[...pr,p]);toast2("✦ "+p.nombre+" añadido");}};
  const rm=id=>setCarrito(pr=>pr.filter(c=>c.id!==id));
  const verCP=cp=>{
    setAddr(a=>({...a,cp,alcaldia:CP_ZONA[cp]||""}));
    if(cp.length===5)setCpSt(CP_ZONA[cp]?"in":"out");
    else setCpSt(null);
  };

  const confirmar=async()=>{
    if(!carrito.length)return;
    if(!addr.nombre||!addr.telefono||!addr.calle||!addr.cp){toast2("⚠️ Completa nombre, teléfono, calle y CP");return;}

      const f=folio();
      const ped=await dbw("pedidos","POST",{folio:f,cliente_nombre:addr.nombre,cliente_telefono:addr.telefono,cliente_calle:addr.calle,cliente_colonia:addr.colonia,cliente_cp:addr.cp,cliente_alcaldia:addr.alcaldia,cliente_referencias:addr.refs,total,tipo_envio:cpSt==="in"?"cobertura":"paqueteria",status:"nuevo"});

      if(pid)await dbw("pedido_items","POST",carrito.map(p=>({pedido_id:pid,producto_id:p.id,nombre:p.nombre,precio:p.precio,cantidad:1})));

    }catch(e){toast2("Error al crear pedido");}
    setEnviando(false);
  };

        <button onClick={()=>setDrawer(true)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 16px",border:"1.5px solid #1a1510",borderRadius:50,background:"transparent",cursor:"pointer",fontSize:13,position:"relative"}}>

        </button>
      </nav>

      {/* HERO */}
      <div style={{background:"#1a1208",padding:"70px 20px 60px",textAlign:"center",position:"relative",overflow:"hidden"}}>

          <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(2.4rem,8vw,4rem)",fontWeight:300,color:"#f0e8d4",lineHeight:1.1,marginBottom:8}}>Rituales que<br/><em style={{color:"#e0aa4a"}}>despiertan</em></h1>

      {/* CATÁLOGO */}

          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}>🔍</span>

        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:28}}>
          {cats.map(c=><button key={c} onClick={()=>setFiltro(c)} style={{padding:"7px 16px",borderRadius:50,border:"1.5px solid "+(filtro===c?"#c8902a":"#e0d8cc"),background:filtro===c?"#c8902a":"white",color:filtro===c?"white":"#2e2416",cursor:"pointer",fontSize:13}}>{c}</button>)}

        <div style={{display:"flex",flexDirection:"column",gap:16}}>

      <div style={{position:"fixed",right:0,top:0,bottom:0,width:"min(92vw,390px)",background:"#faf7f2",zIndex:201,transform:drawer?"translateX(0)":"translateX(100%)",transition:"transform 0.35s cubic-bezier(0.4,0,0.2,1)",display:"flex",flexDirection:"column",boxShadow:"-20px 0 60px rgba(0,0,0,0.15)"}}>

        </div>
        <div style={{flex:1,overflowY:"auto",padding:"14px 20px"}}>
          {carrito.length===0
            ?<div style={{textAlign:"center",padding:"50px 0",color:"#7a6e60"}}>🌙 Tu carrito está vacío</div>
            :carrito.map(p=>(
              <div key={p.id} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 0",borderBottom:"1px solid #e0d8cc"}}>

                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600}}>{p.nombre}</div>
                  <div style={{fontSize:12,color:"#c8902a"}}>${p.precio}</div>
                </div>
                <button onClick={()=>rm(p.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:14}}>✕</button>
              </div>
            ))
          }
          {carrito.length>0&&(
            <div style={{marginTop:20}}>
              <div style={{fontSize:11,color:"#7a6e60",letterSpacing:"0.06em",marginBottom:10}}>👤 TUS DATOS</div>
              {[{k:"nombre",ph:"Nombre completo"},{k:"telefono",ph:"Teléfono"}].map(f=>(
                <input key={f.k} value={addr[f.k]} onChange={e=>setAddr(a=>({...a,[f.k]:e.target.value}))} placeholder={f.ph} style={{...I(),marginBottom:8}}/>
              ))}
              <div style={{fontSize:11,color:"#7a6e60",letterSpacing:"0.06em",margin:"12px 0 10px"}}>📍 DIRECCIÓN DE ENTREGA</div>
              {[{k:"calle",ph:"Calle y número"},{k:"colonia",ph:"Colonia"}].map(f=>(
                <input key={f.k} value={addr[f.k]} onChange={e=>setAddr(a=>({...a,[f.k]:e.target.value}))} placeholder={f.ph} style={{...I(),marginBottom:8}}/>
              ))}
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <input value={addr.cp} onChange={e=>{const v=e.target.value.replace(/\D/g,"").slice(0,5);verCP(v);}} placeholder="Código postal" maxLength={5} style={{...I(),flex:1,border:"1.5px solid "+(cpSt==="in"?"#2d7a2d":cpSt==="out"?"#c8902a":"#e0d8cc")}}/>
                <input value={addr.alcaldia} readOnly placeholder="Alcaldía" style={{...I(),flex:1,background:"#f5f0e8",color:"#7a6e60"}}/>
              </div>
              <input value={addr.refs} onChange={e=>setAddr(a=>({...a,refs:e.target.value}))} placeholder="Referencias" style={{...I()}}/>
              {cpSt==="in"&&<div style={{marginTop:8,padding:"8px 12px",background:"rgba(34,139,34,0.08)",border:"1px solid rgba(34,139,34,0.2)",borderRadius:10,fontSize:12,color:"#2d7a2d"}}>✅ Zona con cobertura — Envío sin costo</div>}
              {cpSt==="out"&&<div style={{marginTop:8,padding:"8px 12px",background:"rgba(200,144,42,0.08)",border:"1px solid rgba(200,144,42,0.25)",borderRadius:10,fontSize:12,color:"#8a6010"}}>📦 Fuera de zona — Envío por paquetería</div>}
            </div>
          )}
        </div>
        <div style={{padding:"14px 20px 20px",borderTop:"1px solid #e0d8cc"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,fontSize:14}}>
            <span style={{color:"#7a6e60"}}>Total</span>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",fontWeight:600}}>${total}</span>
          </div>
          <button onClick={confirmar} disabled={!carrito.length||enviando} style={{...B(),opacity:carrito.length&&!enviando?1:0.5,cursor:carrito.length&&!enviando?"pointer":"not-allowed"}}>
            {enviando?"Enviando…":"Confirmar pedido 📲"}
          </button>
        </div>
      </div>

      {/* FAQ */}
      <button onClick={()=>{setFaqOpen(o=>!o);setFaqIdx(null);}} style={{position:"fixed",bottom:20,right:20,width:50,height:50,background:faqOpen?"#1a1510":"#c8902a",border:"none",borderRadius:"50%",cursor:"pointer",zIndex:400,fontSize:20,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",transition:"all 0.2s"}}>
        {faqOpen?"✕":"💬"}
      </button>
      {faqOpen&&(
        <div style={{position:"fixed",bottom:82,right:16,width:"min(92vw,330px)",background:"#faf7f2",borderRadius:20,zIndex:399,boxShadow:"0 12px 50px rgba(0,0,0,0.2)",border:"1px solid #e0d8cc",overflow:"hidden",maxHeight:"65vh",display:"flex",flexDirection:"column"}}>
          <div style={{background:"#1a1510",padding:"14px 18px"}}><div style={{fontFamily:"'Cormorant Garamond',serif",color:"#f0e8d4",fontSize:15,fontWeight:600}}>☽ Preguntas frecuentes</div></div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
            {FAQS.map((f,i)=>(
              <div key={i} style={{marginBottom:8}}>
                <button onClick={()=>setFaqIdx(faqIdx===i?null:i)} style={{width:"100%",textAlign:"left",padding:"10px 14px",background:faqIdx===i?"#1a1510":"white",color:faqIdx===i?"#f0e8d4":"#2e2416",border:"1.5px solid "+(faqIdx===i?"#c8902a":"#e0d8cc"),borderRadius:faqIdx===i?"12px 12px 0 0":12,cursor:"pointer",fontSize:13,fontWeight:500,display:"flex",justifyContent:"space-between"}}>
                  {f.q}<span style={{color:"#c8902a"}}>{faqIdx===i?"−":"+"}</span>
                </button>
                {faqIdx===i&&<div style={{padding:"10px 14px",background:"#f5f0e8",border:"1.5px solid #c8902a",borderTop:"none",borderRadius:"0 0 12px 12px",fontSize:13,lineHeight:1.6}}>{f.a}</div>}
              </div>
            ))}
            <div style={{margin:"8px 0 4px",padding:"12px 14px",background:"rgba(200,144,42,0.07)",border:"1px solid rgba(200,144,42,0.25)",borderRadius:12,textAlign:"center"}}>
              <div style={{fontSize:12,color:"#7a6e60",marginBottom:6}}>¿No encontraste tu respuesta?</div>
              <a href="https://wa.me/525648229075" target="_blank" rel="noopener noreferrer" style={{color:"#c8902a",fontWeight:700,fontSize:15,textDecoration:"none"}}>📱 5648229075</a>
            </div>
          </div>
        </div>

/* ══════════════════════════════════════════════
   ADMIN

function Admin({onSalir}){
  const [sec,setSec]=useState("pedidos");
  const [pedidos,setPedidos]=useState([]);
  const [prods,setProds]=useState([]);
  const [cfg,setCfg]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState("");
  const [detalle,setDetalle]=useState(null);
  const [editP,setEditP]=useState(null);
  const [filtroSt,setFiltroSt]=useState("todos");
  const t=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  useEffect(()=>{
    (async()=>{
      const [pe,pr,c]=await Promise.all([
        db("pedidos","?select=*&order=created_at.desc"),
        db("productos","?select=*&order=id.asc"),
        db("config","?select=*"),
      ]);
      setPedidos(Array.isArray(pe)?pe:[]);
      setProds(Array.isArray(pr)?pr:[]);
      setCfg(Array.isArray(c)?c:[]);
      setLoading(false);
    })();
  },[]);

  const hoy=new Date().toISOString().slice(0,10);
  const hoyP=pedidos.filter(p=>p.created_at?.slice(0,10)===hoy);
  const ventasH=hoyP.filter(p=>p.status!=="cancelado").reduce((s,p)=>s+Number(p.total),0);
  const nuevos=pedidos.filter(p=>p.status==="nuevo").length;

  const cambSt=async(id,status)=>{
    await dbw("pedidos","PATCH",{status},"?id=eq."+id);
    setPedidos(pr=>pr.map(p=>p.id===id?{...p,status}:p));
    if(detalle?.id===id)setDetalle(pr=>({...pr,status}));
    t("✦ Status actualizado");
  };

  const guardarP=async(form)=>{
    const d={nombre:form.nombre,descripcion:form.descripcion,precio:Number(form.precio),stock:Number(form.stock),categoria:form.categoria,emoji:form.emoji||"✨",activo:form.activo,imagen_url:form.imagen_url||null};
    if(form.id){
      await dbw("productos","PATCH",d,"?id=eq."+form.id);
      setProds(pr=>pr.map(p=>p.id===form.id?{...p,...d}:p));
    }else{
      const n=await dbw("productos","POST",d);
      if(Array.isArray(n)&&n[0])setProds(pr=>[...pr,n[0]]);
    }
    setEditP(null);t("✦ Producto guardado");
  };

  const elimP=async(id)=>{
    await dbdel("productos","?id=eq."+id);
    setProds(pr=>pr.filter(p=>p.id!==id));
    setEditP(null);t("Producto eliminado");
  };

  const guardarCfg=async(items)=>{
    await Promise.all(items.map(i=>dbw("config","PATCH",{valor:i.valor},"?clave=eq."+i.clave)));
    setCfg(items);t("✦ Config guardada");
  };

  const pedF=filtroSt==="todos"?pedidos:pedidos.filter(p=>p.status===filtroSt);

  if(loading)return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spin/></div>;

  return(
    <div style={{fontFamily:"'Jost',sans-serif",background:"#f5f0e8",minHeight:"100vh"}}>
      <div style={{background:"#1a1510",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#f0e8d4",fontWeight:600}}>☽ Aether <span style={{color:"#c8902a",fontSize:13,fontWeight:400}}>Admin</span></div>
        <button onClick={onSalir} style={{fontSize:12,color:"rgba(240,220,180,0.6)",background:"none",border:"1px solid rgba(240,220,180,0.2)",borderRadius:50,padding:"5px 14px",cursor:"pointer"}}>Ver tienda</button>
      </div>

      {/* STATS */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,padding:"16px",maxWidth:480,margin:"0 auto"}}>
        {[{l:"Pedidos hoy",v:hoyP.length,i:"📦"},{l:"Ventas hoy",v:"$"+ventasH,i:"💰"},{l:"Sin confirmar",v:nuevos,i:"🆕"}].map(s=>(
          <div key={s.l} style={{background:"white",borderRadius:14,padding:"12px 10px",textAlign:"center",border:"1px solid #e0d8cc"}}>
            <div style={{fontSize:20,marginBottom:4}}>{s.i}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",fontWeight:600}}>{s.v}</div>
            <div style={{fontSize:11,color:"#7a6e60"}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"2px solid #e0d8cc",background:"white",padding:"0 16px",maxWidth:480,margin:"0 auto"}}>
        {[["pedidos","📋 Pedidos"],["productos","📦 Productos"],["config","⚙️ Config"]].map(([k,l])=>(
          <button key={k} onClick={()=>setSec(k)} style={{padding:"13px 14px",border:"none",background:"transparent",cursor:"pointer",fontSize:13,fontWeight:500,color:sec===k?"#c8902a":"#7a6e60",borderBottom:sec===k?"2px solid #c8902a":"2px solid transparent",marginBottom:-2}}>{l}</button>
        ))}
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px 80px"}}>

        {/* PEDIDOS */}
        {sec==="pedidos"&&(
          <>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
              {[["todos","Todos"],["nuevo","🆕 Nuevos"],["confirmado","✅ Conf."],["enviado","🚚 Env."],["entregado","🏠 Entr."],["cancelado","❌ Canc."]].map(([k,l])=>(
                <button key={k} onClick={()=>setFiltroSt(k)} style={{padding:"5px 12px",borderRadius:50,border:"1.5px solid "+(filtroSt===k?"#c8902a":"#e0d8cc"),background:filtroSt===k?"#c8902a":"white",color:filtroSt===k?"white":"#2e2416",cursor:"pointer",fontSize:12}}>{l}</button>
              ))}
            </div>
            {pedF.length===0&&<div style={{textAlign:"center",padding:60,color:"#7a6e60"}}>🌙 Sin pedidos</div>}
            {pedF.map(p=>(
              <div key={p.id} onClick={()=>setDetalle(p)} style={{background:"white",borderRadius:16,border:"1px solid #e0d8cc",padding:"14px 16px",marginBottom:10,cursor:"pointer"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600}}>{p.folio}</div>
                    <div style={{fontSize:12,color:"#7a6e60"}}>{p.cliente_nombre} · {p.cliente_telefono}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:16,fontWeight:600,color:"#c8902a"}}>${p.total}</div>
                    <span style={{fontSize:11,padding:"2px 8px",borderRadius:50,background:ST_COLORS[p.status]+"22",color:ST_COLORS[p.status]}}>{ST_LABELS[p.status]}</span>
                  </div>
                </div>
                <div style={{fontSize:12,color:"#7a6e60"}}>{p.tipo_envio==="cobertura"?"🚚 Sin costo":"📦 Paquetería"} · {new Date(p.created_at).toLocaleDateString("es-MX",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
              </div>
            ))}
          </>
        )}

        {/* PRODUCTOS */}
        {sec==="productos"&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.5rem"}}>Productos</div>
              <button onClick={()=>setEditP({id:null,nombre:"",descripcion:"",precio:0,stock:0,categoria:CATS[0],emoji:"✨",imagen_url:null,activo:true})} style={{...B("#c8902a",{width:"auto",padding:"8px 16px"})}}>+ Nuevo</button>
            </div>
            {prods.map(p=>(
              <div key={p.id} style={{background:"white",borderRadius:14,border:"1px solid #e0d8cc",padding:"12px 14px",marginBottom:10,display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:52,height:52,borderRadius:10,background:p.imagen_url?"url("+p.imagen_url+") center/cover":"#f0ecf5",backgroundSize:"cover",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem",flexShrink:0}}>{!p.imagen_url&&p.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600}}>{p.nombre}</div>
                  <div style={{fontSize:12,color:"#7a6e60",display:"flex",gap:8,marginTop:3}}>
                    <span style={{color:"#c8902a",fontWeight:500}}>${p.precio}</span>
                    <span style={{color:p.stock>3?"#2d7a2d":p.stock>0?"#c8902a":"#999"}}>Stock: {p.stock}</span>
                    {!p.activo&&<span style={{color:"#999"}}>Oculto</span>}
                  </div>
                </div>
                <button onClick={()=>setEditP({...p})} style={{padding:"6px 14px",border:"1.5px solid #e0d8cc",borderRadius:50,background:"transparent",cursor:"pointer",fontSize:12}}>Editar</button>
              </div>
            ))}
          </>
        )}

        {/* CONFIG */}
        {sec==="config"&&<ConfigForm cfg={cfg} onGuardar={guardarCfg}/>}
      </div>

      {detalle&&<DetallePed ped={detalle} onClose={()=>setDetalle(null)} onSt={cambSt}/>}
      {editP&&<EditorProd prod={editP} onGuardar={guardarP} onClose={()=>setEditP(null)} onElim={elimP}/>}
      {toast&&<Toast msg={toast}/>}
    </div>
  );
}

/* ── EDITOR PRODUCTO ── */
function EditorProd({prod,onGuardar,onClose,onElim}){
  const [form,setForm]=useState({...prod});
  const [sub,setSub]=useState(false);
  const [conf,setConf]=useState(false);
  const s=(k,v)=>setForm(f=>({...f,[k]:v}));

  const subirFoto=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    setSub(true);
    try{
      const ext=file.name.split(".").pop();
      const nom="prod_"+Date.now()+"."+ext;
      const r=await fetch(SB_URL+"/storage/v1/object/productos/"+nom,{
        method:"POST",
        headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":file.type,"x-upsert":"true"},
        body:file
      });
      if(r.ok)s("imagen_url",SB_URL+"/storage/v1/object/public/productos/"+nom);
      else alert("Error al subir. Verifica que el bucket 'productos' esté creado y sea público en Supabase Storage.");
    }catch(e){alert("Error de conexión.");}
    setSub(false);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#faf7f2",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",padding:"24px 20px 32px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.4rem"}}>{form.id?"Editar producto":"Nuevo producto"}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#7a6e60"}}>✕</button>
        </div>

        {/* FOTO */}
        <div style={{marginBottom:20,textAlign:"center"}}>
          <div style={{width:120,height:120,margin:"0 auto 10px",borderRadius:16,background:form.imagen_url?"url("+form.imagen_url+") center/cover":"#f0ecf5",backgroundSize:"cover",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"3rem",border:"2px dashed #e0d8cc",overflow:"hidden"}}>
            {!form.imagen_url&&(form.emoji||"📷")}
          </div>
          <label style={{display:"inline-block",padding:"8px 20px",background:"#c8902a",color:"white",borderRadius:50,fontSize:13,cursor:"pointer",fontWeight:500}}>
            {sub?"Subiendo…":"📷 "+(form.imagen_url?"Cambiar foto":"Subir foto")}
            <input type="file" accept="image/*" onChange={subirFoto} style={{display:"none"}} disabled={sub}/>
          </label>
          {form.imagen_url&&<button onClick={()=>s("imagen_url",null)} style={{display:"block",margin:"8px auto 0",fontSize:12,color:"#999",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Quitar foto</button>}
        </div>

        {[{l:"Nombre",k:"nombre"},{l:"Descripción",k:"descripcion"},{l:"Precio ($)",k:"precio",n:true},{l:"Stock",k:"stock",n:true},{l:"Emoji",k:"emoji"}].map(f=>(
          <div key={f.k} style={{marginBottom:12}}>
            <label style={{fontSize:12,color:"#7a6e60",display:"block",marginBottom:4}}>{f.l}</label>
            <input type={f.n?"number":"text"} value={form[f.k]||""} onChange={e=>s(f.k,f.n?Number(e.target.value):e.target.value)} style={{...I()}}/>
          </div>
        ))}

        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,color:"#7a6e60",display:"block",marginBottom:4}}>Categoría</label>
          <select value={form.categoria} onChange={e=>s("categoria",e.target.value)} style={{...I()}}>
            {CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <input type="checkbox" id="actv" checked={!!form.activo} onChange={e=>s("activo",e.target.checked)} style={{width:16,height:16}}/>
          <label htmlFor="actv" style={{fontSize:14,cursor:"pointer"}}>Visible en tienda</label>
        </div>

        <button onClick={()=>onGuardar(form)} style={{...B(),marginBottom:10}}>Guardar cambios</button>

        {form.id&&!conf&&<button onClick={()=>setConf(true)} style={{...B("transparent",{color:"#c0392b",border:"1.5px solid #c0392b"})}}>Eliminar producto</button>}
        {conf&&(
          <div style={{background:"rgba(192,57,43,0.06)",border:"1px solid rgba(192,57,43,0.2)",borderRadius:12,padding:"14px 16px",textAlign:"center"}}>
            <div style={{fontSize:13,marginBottom:12,color:"#c0392b"}}>¿Seguro que quieres eliminar este producto?</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>onElim(form.id)} style={{...B("#c0392b",{flex:1})}}>Sí, eliminar</button>
              <button onClick={()=>setConf(false)} style={{...B("transparent",{flex:1,color:"#2e2416",border:"1.5px solid #e0d8cc"})}}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── CONFIG FORM ── */
function ConfigForm({cfg,onGuardar}){
  const [items,setItems]=useState(cfg.map(c=>({...c})));
  const [pa,setPa]=useState("");
  const [pn,setPn]=useState("");
  const [pc,setPc]=useState("");
  const [pm,setPm]=useState("");
  const LABELS={whatsapp:"WhatsApp (con código de país)",banco:"Banco",titular:"Titular de cuenta",clabe:"CLABE (18 dígitos)",cuenta:"Número de cuenta",concepto:"Concepto de pago"};
  const set=(clave,valor)=>setItems(pr=>pr.map(i=>i.clave===clave?{...i,valor}:i));
  const cambiarPin=()=>{
    if(pa!==getPin()){setPm("❌ PIN actual incorrecto");return;}
    if(pn.length<4){setPm("❌ Mínimo 4 dígitos");return;}
    if(pn!==pc){setPm("❌ Los PINs no coinciden");return;}
    localStorage.setItem("aether_pin",pn);
    setPa("");setPn("");setPc("");
    setPm("✅ PIN cambiado");setTimeout(()=>setPm(""),3000);
  };
  return(
    <div>
      <div style={{background:"white",borderRadius:16,border:"1px solid #e0d8cc",padding:20,marginBottom:16}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:20}}>Cuenta bancaria y contacto</div>
        {items.map(item=>(
          <div key={item.clave} style={{marginBottom:14}}>
            <label style={{fontSize:12,color:"#7a6e60",display:"block",marginBottom:4}}>{LABELS[item.clave]||item.clave}</label>
            <input value={item.valor||""} onChange={e=>set(item.clave,e.target.value)} style={{...I(),background:"#faf7f2"}}/>
          </div>
        ))}
        <button onClick={()=>onGuardar(items)} style={{...B(),marginTop:4}}>Guardar configuración</button>
      </div>
      <div style={{background:"white",borderRadius:16,border:"1px solid #e0d8cc",padding:20}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",marginBottom:20}}>🔐 Cambiar PIN de admin</div>
        {[{l:"PIN actual",v:pa,s:setPa},{l:"PIN nuevo",v:pn,s:setPn},{l:"Confirmar PIN nuevo",v:pc,s:setPc}].map(f=>(
          <div key={f.l} style={{marginBottom:12}}>
            <label style={{fontSize:12,color:"#7a6e60",display:"block",marginBottom:4}}>{f.l}</label>
            <input type="password" value={f.v} onChange={e=>f.s(e.target.value)} maxLength={10} style={{...I(),letterSpacing:"0.2em"}}/>
          </div>
        ))}
        {pm&&<div style={{padding:"8px 12px",borderRadius:10,background:pm.startsWith("✅")?"rgba(34,139,34,0.08)":"rgba(200,50,50,0.08)",fontSize:13,marginBottom:12,color:pm.startsWith("✅")?"#2d7a2d":"#c0392b"}}>{pm}</div>}
        <button onClick={cambiarPin} style={{...B()}}>Cambiar PIN</button>
      </div>
    </div>
  );
}

  if(vista==="pin")return(
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#1a1208",flexDirection:"column",gap:20,padding:24}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"2rem",color:"#e0aa4a"}}>☽ Admin</div>
      <input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entrar()} placeholder="PIN" maxLength={6}
        style={{padding:"12px 20px",border:"2px solid "+(err?"#c0392b":"rgba(200,144,42,0.3)"),borderRadius:50,background:"transparent",color:"white",fontSize:18,outline:"none",textAlign:"center",letterSpacing:"0.3em",width:200}}/>
      {err&&<div style={{color:"#e74c3c",fontSize:13}}>PIN incorrecto</div>}
      <button onClick={entrar} style={{padding:"12px 32px",background:"#c8902a",color:"white",border:"none",borderRadius:50,fontSize:14,cursor:"pointer",fontWeight:500}}>Entrar</button>
      <button onClick={()=>setVista("tienda")} style={{color:"rgba(240,220,180,0.4)",background:"none",border:"none",cursor:"pointer",fontSize:13}}>Volver</button>
    </div>
  );
  if(vista==="admin")return <Admin onSalir={()=>setVista("tienda")}/>;
  return <Tienda onAdmin={()=>setVista("pin")}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
